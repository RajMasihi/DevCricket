services:

  app:
    image: yourdockerhub/cricketapp:latest
    restart: always
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app